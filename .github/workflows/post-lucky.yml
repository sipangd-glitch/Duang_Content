name: Post Lucky Numbers Daily

on:
  schedule:
    # 06:24 น. เวลาไทย (UTC+7) = 23:24 UTC ของวันก่อนหน้า
    - cron: '24 23 * * *'
  workflow_dispatch: {}

jobs:
  post:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Install dependencies
        working-directory: automation
        run: npm install
      - name: Run automation (post to Make.com)
        working-directory: automation
        env:
          SITE_URL: ${{ secrets.SITE_URL }}
          MAKE_WEBHOOK_LUCKY: ${{ secrets.MAKE_WEBHOOK_LUCKY }}
          TZ: Asia/Bangkok
        run: node run-post.js lucky
